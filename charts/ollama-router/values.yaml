#
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.
# For a full list of values, see https://github.com/bjw-s/helm-charts/blob/main/charts/library/common/values.yaml
#

# -- Controllers configuration
# @default -- See below
controllers:
  # -- The main controller for the application.
  # The key `main` is the identifier used by services and ingresses.
  # @default -- See below
  main:
    # -- Enable this controller.
    # @default -- `true`
    enabled: true
    # -- The type of controller to deploy.
    # @default -- `deployment`
    type: deployment
    # -- The number of replicas to deploy.
    # @default -- `1`
    replicas: 1
    # -- The strategy to use for deployments.
    # @default -- `RollingUpdate`
    strategy: RollingUpdate

    # -- The main container configuration.
    # @default -- See below
    containers:
      main:
        # -- The image to deploy.
        # @default -- See below
        image:
          # -- Image repository for the Ollama router.
          repository: harbor.obeone.cloud/public/ollama-router
          # -- Image pull policy for the container.
          pullPolicy: IfNotPresent
          # -- Image tag, leave empty to use `chart.appVersion`.
          tag: latest

        # -- Environment variables for the container.
        # @default -- See below
        env:
          # -- Log level for the application (e.g., debug, info, warn, error).
          LOG_LEVEL: "info"
          # -- JSON array of Ollama backend nodes to connect to.
          OLLAMA_NODES_JSON: '[{"name":"ollama1","baseURL":"http://ollama:11434"},{"name":"ollama2","baseURL":"https://ollama2:11434"}]'
          # -- Health check polling interval in seconds.
          POLL_INTERVAL_SECONDS: "5"
          # -- Model ownership cache TTL (Time To Live) in seconds.
          MODEL_CACHE_TTL_SECONDS: "120"

        # -- Probes for liveness, readiness, and startup checks.
        # @default -- See below
        probes:
          liveness:
            # -- Enable the liveness probe.
            # @default -- `true`
            enabled: true
            # -- The specification for the liveness probe.
            # @default -- See below
            spec:
              httpGet:
                path: /healthz
                port: &port 8080 # Anchor for reuse in other probes/services
              initialDelaySeconds: 15
              periodSeconds: 10
              timeoutSeconds: 5
              failureThreshold: 3
          readiness:
            # -- Enable the readiness probe.
            # @default -- `true`
            enabled: true
            # -- The specification for the readiness probe.
            # @default -- See below
            spec:
              httpGet:
                path: /healthz
                port: *port # Use the anchored port from liveness probe
              initialDelaySeconds: 5
              periodSeconds: 10
              timeoutSeconds: 5
              failureThreshold: 3

# -- Service configuration
# @default -- See below
service:
  # -- The main service configuration for the Ollama router application.
  # @default -- See below
  main:
    # -- The controller that this service should target.
    # @default -- `main`
    controller: main
    # -- The ports exposed by the main service.
    # @default -- See below
    ports:
      http:
        port: *port # Use the anchored port from liveness probe

  # -- The metrics service configuration.
  # This service exposes Prometheus metrics from the application.
  # @default -- See below
  metrics:
    # -- Enable the metrics service.
    # @default -- `true`
    enabled: true
    # -- The controller that this service should target.
    # @default -- `main`
    controller: main
    # -- The ports for the metrics service.
    # @default -- See below
    ports:
      metrics:
        port: 9090

# -- Ingress configuration
# This section defines how external traffic is routed to the services.
# @default -- See below
ingress:
  # -- The main ingress configuration for the Ollama router.
  # @default -- See below
  main:
    # -- Enable the ingress.
    # @default -- `false`
    enabled: true
    # -- The ingress class to use (e.g., "nginx", "traefik"). Uncomment and set if needed.
    # ingressClassName: "nginx"
    # -- Annotations for the ingress resource. Uncomment and set if needed (e.g., for cert-manager).
    # annotations:
    #   cert-manager.io/cluster-issuer: "letsencrypt-prod"
    # -- The hosts for the ingress.
    # @default -- See below
    hosts:
      - host: "ollama-router.obeone.cloud"
        paths:
          - path: /
            pathType: Prefix
            service:
              identifier: main
              port: http
          - path: /v1
            pathType: Prefix
            service:
              identifier: main
              port: http
    tls: # TLS configuration for the ingress
      - secretName: obeone-cloud-tls # Name of the Kubernetes secret containing the TLS certificate

serviceMonitor:
  main:
    # -- Enables or disables the serviceMonitor.
    enabled: false

    # -- Override the name suffix that is used for this serviceMonitor.
    nameOverride: ""

    # -- Provide additional annotations which may be required.
    annotations: {}

    # -- Provide additional labels which may be required.
    labels: {}

    # -- Configures a custom selector for the serviceMonitor, this takes precedence over
    # specifying a service name.
    # Helm templates can be used.
    selector: {}

    # -- Configures the target Service for the serviceMonitor. Helm templates can be used.
    serviceName: '{{ include "bjw-s.common.lib.chart.names.fullname" $ }}-metrics'

    # -- Configures the endpoints for the serviceMonitor. Helm templates can be used.
    # @default -- See values.yaml
    endpoints:
      - port: metrics
        scheme: http
        path: /metrics
        interval: 30s
        scrapeTimeout: 10s

    # -- Configures custom targetLabels for the serviceMonitor. (All collected
    # meterics will have these labels, taking the value from the target service)
    # [[ref]](https://github.com/prometheus-operator/prometheus-operator/blob/main/Documentation/api.md#servicemonitorspec/)
    targetLabels: []
