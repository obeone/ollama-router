#
# Example values for the ollama-router Helm chart.
# Override anything you need in your own values file — do not edit this
# in place for site-specific changes (use values_local.yaml or a values
# file passed via `-f`).
#
# Full surface of inherited keys:
# https://github.com/bjw-s-labs/helm-charts/tree/main/charts/library/common
#

# -- Controllers configuration
# @default -- See below
controllers:
  # -- The main controller for the application.
  # The key `main` is the identifier used by services and ingresses.
  # @default -- See below
  main:
    # -- Enable this controller.
    enabled: true
    # -- The type of controller to deploy.
    type: deployment
    # -- The number of replicas to deploy.
    # Note: the router pins sessions to a node via an in-memory cache,
    # so scaling >1 trades cache locality for HA — your call.
    replicas: 1
    # -- The strategy to use for deployments.
    strategy: RollingUpdate

    # -- The main container configuration.
    # @default -- See below
    containers:
      main:
        # -- The image to deploy.
        # Public images:
        #   - obeoneorg/ollama-router        (Docker Hub)
        #   - ghcr.io/obeone/ollama-router   (GHCR)
        # @default -- See below
        image:
          # -- Image repository for the Ollama router.
          repository: ghcr.io/obeone/ollama-router
          # -- Image pull policy for the container.
          pullPolicy: IfNotPresent
          # -- Image tag. Leave empty to use `chart.appVersion`.
          tag: latest

        # -- Environment variables for the container.
        # See the root README for the full list and semantics.
        # @default -- See below
        env:
          # -- Log level: debug, info, warn, error.
          LOG_LEVEL: "info"
          # -- JSON array of Ollama backend nodes. REQUIRED — override
          # this with your real backends before deploying.
          OLLAMA_NODES_JSON: |
            [
              {"name":"ollama1","baseURL":"http://ollama-1.example.com:11434"},
              {"name":"ollama2","baseURL":"http://ollama-2.example.com:11434"}
            ]
          # -- Health check polling interval (seconds).
          POLL_INTERVAL_SECONDS: "5"
          # -- Model ownership cache TTL (seconds).
          MODEL_CACHE_TTL_SECONDS: "120"

        # -- Probes for liveness, readiness, and startup checks.
        # @default -- See below
        probes:
          liveness:
            # -- Enable the liveness probe.
            enabled: true
            spec:
              httpGet:
                path: /healthz
                port: &port 8080 # Anchor reused by readiness + service
              initialDelaySeconds: 15
              periodSeconds: 10
              timeoutSeconds: 5
              failureThreshold: 3
          readiness:
            # -- Enable the readiness probe.
            enabled: true
            spec:
              httpGet:
                path: /healthz
                port: *port
              initialDelaySeconds: 5
              periodSeconds: 10
              timeoutSeconds: 5
              failureThreshold: 3

# -- Service configuration
# @default -- See below
service:
  # -- The main service for the router HTTP API.
  main:
    controller: main
    ports:
      http:
        port: *port

  # -- The metrics service (Prometheus exposition).
  # Kept on a separate Service so it can stay cluster-internal even
  # when the main service is exposed via Ingress.
  metrics:
    enabled: true
    controller: main
    ports:
      metrics:
        port: 9090

# -- Ingress configuration
# Disabled by default — enable and set your own host/TLS.
# @default -- See below
ingress:
  main:
    enabled: false
    # ingressClassName: nginx
    # annotations:
    #   cert-manager.io/cluster-issuer: letsencrypt-prod
    hosts:
      - host: ollama-router.example.com
        paths:
          - path: /
            pathType: Prefix
            service:
              identifier: main
              port: http
          - path: /v1
            pathType: Prefix
            service:
              identifier: main
              port: http
    # tls:
    #   - secretName: ollama-router-tls
    #     hosts:
    #       - ollama-router.example.com

# -- ServiceMonitor for Prometheus Operator.
# Disabled by default — flip `enabled` if you run the operator.
serviceMonitor:
  main:
    # -- Enables or disables the serviceMonitor.
    enabled: false

    # -- Override the name suffix used for this serviceMonitor.
    nameOverride: ""

    # -- Additional annotations.
    annotations: {}

    # -- Additional labels.
    labels: {}

    # -- Custom selector — takes precedence over `serviceName`.
    selector: {}

    # -- Target Service for the serviceMonitor. Helm templates allowed.
    serviceName: '{{ include "bjw-s.common.lib.chart.names.fullname" $ }}-metrics'

    # -- Endpoints scraped by the serviceMonitor.
    # @default -- See values.yaml
    endpoints:
      - port: metrics
        scheme: http
        path: /metrics
        interval: 30s
        scrapeTimeout: 10s

    # -- Custom target labels copied onto collected metrics.
    # https://github.com/prometheus-operator/prometheus-operator/blob/main/Documentation/api.md#servicemonitorspec
    targetLabels: []
